services:
  - type: web
    name: edo-ldpr
    runtime: python
    repo: https://github.com/ВАШ_АККАУНТ/edo-ldpr  # Замените на ваш репозиторий
    plan: free
    region: frankfurt  # или frankfurt для Европы
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app_flask --workers 2 --threads 4 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: edo-ldpr-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: edo-ldpr-db
    plan: free
    region: frankfurt