services:
  - type: web
    name: edo-ldpr
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app_flask --workers 2 --threads 4 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: edo-ldpr-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: edo-ldpr-db
    plan: free
    region: frankfurt
